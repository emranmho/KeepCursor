name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish CursorKeep/CursorKeep.csproj -r win-x64 -c Release -p:PublishSingleFile=true --self-contained true --nologo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: CursorKeep/bin/Release/net10.0-windows/win-x64/publish/CursorKeep.exe
          generate_release_notes: true
